apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: laravel-app-ingress
spec:
  ingressClassName: nginx
  rules:
    - host: laravel-test.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: laravel-app
                port:
                  number: 80